{% extends "base.html" %} 
{% block title %}New Book{% endblock title %} 
{% block content %}
<div class="p-5">
    <form  method="POST" enctype="multipart/form-data">
         {% csrf_token %}
  <div class="form-group mb-3">
    <label for="exampleInputEmail1">Book Name</label>
    <input type="text" name = "name" class="form-control"  aria-describedby="emailHelp" placeholder="Book Name">
  </div>
  <div class="form-group mb-3">
    <label for="exampleInputPassword1">Author Name</label>
    <input type="text" name = "author" class="form-control" placeholder="Author Name">
  </div>
  <div class="form-group mb-3">
    <label for="exampleInputPassword1">Price</label>
    <input type="number" name = "price" class="form-control" placeholder="Price">
  </div>
  <div class="form-group mb-3">
    <label for="exampleInputPassword1">Upload File</label>
    <input type="file" name = "book_image" class="file" placeholder="Password">
  </div>
  <button type="submit" class="btn btn-primary">Submit</button>
</form>
</div>

{% endblock content %}
