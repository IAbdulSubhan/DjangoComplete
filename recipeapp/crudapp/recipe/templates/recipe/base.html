<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Recipe App{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.simplecss.org/simple.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
</head>
<body>
    <header>
        <h1 class="text-danger">My Recipe App</h1>
        <nav>
            <a href="/">Home</a>
            <a href="/recipes/">Recipes</a>
            {% if user.is_authenticated %}
            <a href="/newrecipe/">New Recipe</a>
            <a href={%url 'logout_page'%}>Logout</a>
            {%else%}
            <a href={%url 'login_page'%}>Login</a>
            {%endif%}
        </nav>
    </header>

    <main>
        {% block content %}
        <!-- Child templates will fill this -->
        {% endblock %}
    </main>

    <footer>
        <p>Made with Django</p>
    </footer>
</body>
</html>
