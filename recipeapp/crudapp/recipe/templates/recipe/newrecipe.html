{% extends "recipe/base.html" %}
{% block title %}Create Recipe - Recipe App{% endblock %}
{% block content %}
    <h2>Welcome to Create Recipe</h2>
    <form class="card shadow-lg p-3" method="post" enctype="multipart/form-data" >
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Recipe Name</label>
            <input type="text" required name="title" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Recipe Description</label>
            <textarea type="text" required name="description" class="form-control" ></textarea>
        </div>
        <div class="mb-3">
            <label for="formFile" class="form-label">Attach image</label>
                <input class="form-control" name="image" type="file" id="formFile">
            </div>
        <button type="submit" class="btn btn-primary">Submit</button>
    </form>
{% endblock %}
